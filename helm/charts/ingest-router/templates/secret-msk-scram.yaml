{{- if .Values.kafka.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kafka.auth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ingest-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.kafka.auth.username | quote }}
  password: {{ .Values.kafka.auth.password | quote }}
{{- end }}
