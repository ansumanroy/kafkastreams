{{- range .Values.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    strimzi.io/cluster: {{ $.Values.clusterName }}
    {{- include "strimzi-kafka.labels" $ | nindent 4 }}
spec:
  topicName: {{ .topicName | quote }}
  partitions: {{ .partitions }}
  replicas: {{ .replicas }}
{{- end }}
