# Optional: create a Kind cluster with a bit more room for Kafka + operators.
# kind create cluster --config kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            system-reserved: memory=512Mi
    # Bump control-plane resources if your Docker Desktop VM allows it.
