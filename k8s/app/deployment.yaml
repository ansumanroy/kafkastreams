apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-router
  namespace: ingest-router
  labels:
    app: ingest-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest-router
  template:
    metadata:
      labels:
        app: ingest-router
    spec:
      containers:
        - name: ingest-router
          image: ingest-router:local
          imagePullPolicy: IfNotPresent
          env:
            - name: BOOTSTRAP_SERVERS
              value: kind-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
            - name: APPLICATION_ID
              value: ingest-router
            - name: ROUTER_CONFIG_PATH
              value: /etc/router/config.json
          volumeMounts:
            - name: router-config
              mountPath: /etc/router/config.json
              subPath: config.json
              readOnly: true
          resources:
            requests:
              memory: 512Mi
              cpu: "250m"
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: router-config
          configMap:
            name: ingest-router-config
