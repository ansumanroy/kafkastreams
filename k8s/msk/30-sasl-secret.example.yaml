# Example SCRAM credentials for the ingest router. Copy to a local file, replace
# CHANGEME values, and apply — or manage the Secret with SealedSecrets / External Secrets /
# your CI/CD. Do not commit real credentials.
#
#   cp 30-sasl-secret.example.yaml 30-sasl-secret.local.yaml
#   kubectl apply -f 30-sasl-secret.local.yaml
#
# Alternative: store a single key KAFKA_SASL_JAAS_CONFIG in this Secret and add that
# env var to the Deployment (valueFrom.secretKeyRef) instead of username/password.
apiVersion: v1
kind: Secret
metadata:
  name: ingest-router-msk-sasl
  namespace: ingest-router-msk
  labels:
    app: ingest-router-msk
type: Opaque
stringData:
  KAFKA_SASL_USERNAME: "CHANGEME_SCRAM_USER"
  KAFKA_SASL_PASSWORD: "CHANGEME_SCRAM_PASSWORD"
