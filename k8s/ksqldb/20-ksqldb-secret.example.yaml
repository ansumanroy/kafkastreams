# Example secret for ksqlDB MSK SCRAM auth.
# Copy this file locally, replace CHANGEME values, and apply.
# Do not commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: ksqldb-server-secrets
  namespace: ingest-router-ksqldb
  labels:
    app: ksqldb-server
type: Opaque
stringData:
  # Full JAAS line used by ksqlDB and its Kafka Streams clients.
  KSQL_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="CHANGEME_SCRAM_USER" password="CHANGEME_SCRAM_PASSWORD";'
